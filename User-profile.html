<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User profile</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #FEF3FF;
            line-height: 1.5;
            letter-spacing: 1px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
        }

        .card {
            background-image: url(../photo/User-profile.png);
            width: 390px;
            height: 844px;
            margin: auto;

            display: flex;
            flex-direction: column;

            position: relative;
            overflow: hidden;

        }

        .card2 {
            padding: 0 27.5px;
            padding-bottom: 300px;
            margin-top: 130px;
            background-color: #F3E4DA;
            border-radius: 50px;
        }

        .card2 .form-input:focus,
        .card2 .form-select:focus {
            outline: none;
            background-color: #D9D9D9;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 5px;
        }

        .form-input {
            max-width: 100%;
            width: 300px;
            padding: 19px 18px;
            margin: 13px 0 10px 0;

            border-radius: 20px;
            border: none;
            outline: none;

            font-size: 0.9rem;
            background-color: #D9D9D9;
            box-shadow: 5px 6px 10px rgba(143, 142, 142, 0.583);
        }

        .form-label {
            font-weight: 600;
        }

        .card2 .form-input:hover {
            outline: 2px solid #5877ff;
        }

        .image {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            margin-top: -100px;
            margin-bottom: 40px;
        }

        .undo-image {

            padding: 0 14px;
            margin-top: 56px;

            /* background-color: #5877ff; */
        }

        h3 {
            font-size: 1.25rem;
        }

        .visa-img {
            padding: 9px 33px;
            border-radius: 10px;
            background-color: #fff;
        }

        .kbank-img {
            padding: 7px 12px;
            border-radius: 10px;
            background-color: #0E8F33;
        }

        .payment-list {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

         footer {
            position: fixed;
            bottom: 0px;

            max-width: 390px;
            width: 100%;
        }

        .box-foot {
            background-color: #B23C0E;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            justify-items: center;

            padding: 16px 0 5px 0;
        }
    </style>
</head>


<body>

    <div class="container">
        <div class="card">
            <div class="undo-image">
                <a href="menu-burger.html"><img src="photo/Undo.png" alt="Photo"></a>
            </div>

            <div class="card2">
                <div class="image">
                    <img src="photo/Ellipse 9.png" alt="Photo">
                </div>

                <form action="" method="">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="fname" class="form-label">Name</label>
                            <input type="text" id="fname" name="fname" placeholder="ใส่ชื่อของคุณ " class="form-input">
                        </div>
                        <div class="form-group">
                            <label for="email" class="form-label"> Email</label>
                            <input type="email" id="femail" name="femail" placeholder="example@email.com"
                                class="form-input">
                        </div>
                    </div>
                </form>

                <h3>Playment Metheds</h3>
                <div class="payment-list">
                    <a href=""><img src="photo/visa-logo_jq4o 1.png" alt="payment photo" class="visa-img"></a>
                    <a href=""><img src="photo/564000004884401 1.png" alt="payment photo" class="kbank-img"></a>
                </div>

            </div>
            <footer>
                <div class="box-foot">
                    <a class="icon" href=""><img src="photo/Home Page.png" alt=""></a>
                    <a class="icon" href=""><img src="photo/Voucher.png" alt=""></a>
                    <a class="icon" href=""><img src="photo/Heart.png" alt=""></a>
                    <a class="icon" href=""><img src="photo/Messaging.png" alt=""></a>
                </div>
            </footer>
        </div>
    </div>
</body>

</html>
