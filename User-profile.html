<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #434343;
            line-height: 1.5;
            letter-spacing: 1px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
        }

        .card {
            background-image: url(../photo/User-profile.png);
            width: 390px;
            height: 844px;
            margin: auto;

            display: flex;
            flex-direction: column;

            position: relative;
            overflow: hidden;

        }

        .card2 {
            padding: 0 27.5px;
            padding-bottom: 300px;
            margin-top:130px;
            background-color: #ffffff;
            border-radius: 50px;
        }

        .card2 .form-input:focus,
        .card2 .form-select:focus {
            outline: none;
            background-color: #D9D9D9;
        }

        .btn-wrapper {
            width: 100%;
            box-sizing: border-box;  /* ไม่ให้ padding ดันจนล้นกรอบ */
            padding: 50px 20px 0 20px;
            display: flex;
            flex-direction: row;
            align-items: start;
            gap: 10px;
        }

        .btn-back {
            display: flex;
            justify-content: space-between;
            font-size: 22px;
            color: #333;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .btn-back:hover {
            transform: translateX(-5px) scale(1.1); /* เลื่อนไปทางซ้ายนิดๆ เหมือนบอกว่ากลับไป */
            color: #FF7B00;
        }


        .btn-logout {
            display: flex;
            justify-content: right;
            align-items: center;
            width: 100%;
            height: 30px;
            margin-right: 10px;
            color: #171717;
            /* background-color: #171717; */
            transition: all 0.3s ease;
        }
        
        .btn-logout:hover {
            color: #4f4f4f;
            transform: translateY(-3px);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 5px;
        }

        .form-input,
        .form-select {
            width: 95%;
            padding: 18px 0;
            border-radius: 12px;
            border: none;
            font-size: 0.9rem;
            background-color: #D9D9D9;
        }

        .form-input {
            margin-top: 11px;
            box-shadow: 0px 8px 20px #0000001a;
            padding-left: 20px;
        }

        .form-label {
            font-weight: 600;
        }

        .card2 .form-input:hover {
            outline: 2px solid #5877ff;
        }

        .image{
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            margin-top: -100px;
            margin-bottom: 40px;
            transition: all 0.3s ease;
        }

        .image:hover {transform: translateY(-4px);}
        .image:active {transform: scale(0.97);}


    </style>
</head>


<body>

    <div class="container">
        <div class="card">
            <div class="btn-wrapper">
                <a href="main-manu.html" class="btn-back"><i class="fas fa-undo-alt"></i></a>
                <a href="index.html" class="btn-logout" style="text-decoration: none;"><i class="fa-solid fa-arrow-right-from-bracket fa-2xl"></i></a>
            </div>
            <div class="card2">
                <div class="image">
                    <img src="photo/Ellipse 9.png" alt="Photo">
                </div>

                <form action="" method="">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="fname" class="form-label">Name</label>
                            <input type="text" id="fname" name="fname" placeholder="ใส่ชื่อของคุณ " class="form-input">
                        </div>
                        <div class="form-group">
                            <label for="email" class="form-label"> Email</label>
                            <input type="email" id="femail" name="femail" placeholder="example@email.com"
                                class="form-input">
                        </div>

                        <div class="form-group">
                            <label for="email" class="form-label"> Delivery address</label>
                            <input type="email" id="faddress" name="faddress" placeholder="Address" class="form-input">
                        </div>
                    </div>
                </form>

            </div>
        </div>
    </div>

</body>

</html>
