<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User profile</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #FEF3FF;
            line-height: 1.5;
            letter-spacing: 1px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
        }

        .screen {
            background-color: #FFFBF1;
            width: 390px;
            height: 844px;
            margin: auto;
        }

        .back-menu {
            margin: 0 18px;
            display: inline-block;
        }

            .status-bar {
            width: 406px;
            margin-bottom: 18px;

            position: relative;
            right: 10px;
        }



        /* ============================================================================================ */

        footer {
            position: fixed;
            bottom: 0px;

            max-width: 390px;
            width: 100%;
        }

        .box-foot {
            background-color: #B23C0E;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            justify-items: center;

            padding: 16px 0 5px 0;
        }

        .voucher-item{
            background-color: #43EE28;

            display: flex;
            justify-content: space-between;
            align-items: center;

            gap: 9px;

            padding: 22px 13px;
            margin: 0 23px 32px 23px;
            border-radius: 15px;
     
        }

        h1{
            margin: 43px 0 28px 23px;
            text-shadow: 0 4px 4px #929292;
        }

        .voucher-item.modul-1{
            background-color: #F45A4F;
     
        }

        .voucher-item.modul-2{
            background-color: #FFB237;
        }
        
        .voucher-content{
            display: flex;
            flex-direction: column;    
        }

        .voucher-text{
            margin: 0 ;
            color: #FFF;
            font-size: 0.875rem;
            font-weight: 700;
        }

        .voucher-code{
            margin: 0 ;
            color: #FFF;
            font-size: 0.75rem;
            font-weight: 700;
        }
        
    </style>
</head>


<body>

    <div class="container">
        <div class="screen">
            <div class="status-bar">
                <img src="photo/Status Bar.png" alt="Photo">
            </div>

            <div>
                <a href="menu-burger.html" class="back-menu"><img src="photo/Undo-black.png" alt="Photo"></a>
            </div>

            <h1>โค้ดส่วนลด</h1>

            <div class="voucher-item">
                <img src="photo/Voucher (1).png" alt="" class="voucher-icon">
                <div class="voucher-content">
                    <p class="voucher-text">ลดทันที 50% (สูงสุด 100.-) เมื่อสั่งครั้งแรก</p>
                    <span class="voucher-code">โค้ด : MAHANAKON</span>
                </div>
            </div>

            <div class="voucher-item modul-1">
                <img src="photo/Voucher (1).png" alt="" class="voucher-icon">
                <div class="voucher-content">
                    <p class="voucher-text">ส่วนลด 30% เฉพาะช่วงเวลา14:00 - 16:00 น.</p>
                    <span class="voucher-code">โค้ด : HAPPYNAKON</span>
                </div>
            </div>

            <div class="voucher-item modul-2">
                <img src="photo/Voucher (1).png" alt="" class="voucher-icon">
                <div class="voucher-content">
                    <p class="voucher-text">ลดเพิ่ม 100.- เมื่อสั่งครบ 500 บาทขึ้นไป</p>
                    <span class="voucher-code">โค้ด : NAKONCOMBO</span>
                </div>
            </div>


            <footer>
                <div class="box-foot">
                    <a class="icon" href=""><img src="photo/Home Page.png" alt=""></a>
                    <a class="icon" href=""><img src="photo/Voucher.png" alt=""></a>
                    <a class="icon" href=""><img src="photo/Heart.png" alt=""></a>
                    <a class="icon" href=""><img src="photo/Messaging.png" alt=""></a>
                </div>
            </footer>
        </div>
    </div>

</body>

</html>
