<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User profile</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #FEF3FF;
            line-height: 1.5;
            letter-spacing: 1px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
        }

        .screen {
            background-color: #FFFBF1;
            width: 390px;
            height: 844px;
            margin: auto;
        }

        .back-menu {
            margin: 0 18px;
            display: inline-block;
        }

        .status-bar {
            width: 406px;
            margin-bottom: 18px;

            position: relative;
            right: 10px;
        }

        /* ============================================================================================ */

        footer {
            position: fixed;
            bottom: 0px;

            max-width: 390px;
            width: 100%;
        }

        .box-foot {
            background-color: #B23C0E;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            justify-items: center;

            padding: 16px 0 5px 0;
        }

        /* ============================================================================================ */

        .container{
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .btn a{
            text-decoration: none;
            background-color: #6DB894;
            color: #FFF;
            
            padding: 18px 43px;
            border-radius: 20px;

            font-size: 1.5rem;
            font-weight: 700;
        }

        .btn{
            display: flex;
            justify-content: center;
            align-items: center;

            margin: 43px 0;
        }

    
    </style>
</head>


<body>

    <div class="container">
        <div class="screen">
            <div class="status-bar">
                <img src="photo/Status Bar.png" alt="Photo">
            </div>

            <div class="container">
                <div>
                    <img src="photo/Group 12.png" alt="">
                </div>
                <div>
                    <img src="photo/Group 13.png" alt="">
                </div>
                <div>
                    <img src="photo/Group 14.png" alt="">
                </div>
            </div>


            <div class="btn">
                <a href="">รวมโค้ดส่วนลด</a>
            </div>

            <footer>
                <div class="box-foot">
                    <a class="icon" href=""><img src="photo/Home Page.png" alt=""></a>
                    <a class="icon" href=""><img src="photo/Voucher.png" alt=""></a>
                    <a class="icon" href=""><img src="photo/Heart.png" alt=""></a>
                    <a class="icon" href=""><img src="photo/Messaging.png" alt=""></a>
                </div>
            </footer>
        </div>
    </div>

</body>

</html>
