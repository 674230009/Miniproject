<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>favorites</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #FEF3FF;
            line-height: 1.5;
            letter-spacing: 1px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
        }
        .card {
            background-color: #E6E6E6;
            width: 390px;
            height: auto;
            margin: auto;
        }
/* 1. กรอบมือถือ */
        .app-container {
            width: 390px;
            height: 800px;
            background-color: white;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            position: relative;
        }

        /* 2. ส่วนหัว */
        .header {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .back-btn { font-size: 20px; cursor: pointer; }
        .header h2 { font-size: 24px; font-weight: bold; }

        .status-bar img{
            width: 390px;
        }

        /* 3. รายการอาหาร (List) */
        .favorites-list {
            flex: 1;
            padding: 0 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            
        }

        /* การ์ดรายการอาหาร */
        .food-item {
            display: flex;
            align-items: center;
            background-color: #E9E9E9;
            border-radius: 15px;
            padding: 10px;
            gap: 15px;
            
        }

        .food-item img {
            width: 80px;
            height: 60px;
            object-fit: contain;
            border-radius: 8px;
        }

        .food-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .food-name { font-weight: 600; font-size: 14px; }
        .food-price { font-size: 14px; color: #333; }

        /* 4. แถบเมนูด้านล่าง  */
        footer {
            position: fixed;
            bottom: 0px;

            max-width: 390px;
            width: 100%;
        }

        .box-foot {
            background-color: #B23C0E;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            justify-items: center;

            padding: 16px 0 15px 0;
        }

        .icon {
            padding: 0;
            margin: 0;
        }

    
        </style>
</head>
<body>
    <div class="container">
            <div class="status-bar">
                <img src="../img/status-barlight.png" alt="Photo">
            </div>


    <div class="app-container">
        <div class="header">
            <a href="menu-burger.html"><img src="../img/Undo-black.png" alt="Photo"></a>
            <h1>เมนูโปรด</h1>
        </div>

        <div class="favorites-list">
            
            <div class="food-item">
                <img src="../img/burger6.png" alt="Crispy Gold Chicken">
                <div class="food-info">
                    <div class="food-name">Crispy Gold Chicken</div>
                    <div class="food-price">179.-</div>
                </div>
            </div>

            <div class="food-item">
                <img src="../img/burger7.png" alt="Premium Tower Burger">
                <div class="food-info">
                    <div class="food-name">Premium Tower Burger</div>
                    <div class="food-price">239.-</div>
                </div>
            </div>

            <div class="food-item">
                <img src="../img/burger4.png" alt="The Combo Feast">
                <div class="food-info">
                    <div class="food-name">The Combo Feast</div>
                    <div class="food-price">219.-</div>
                </div>
            </div>

        </div>

        <footer>
                <div class="box-foot">
                    <a class="icon" href=""><img src="../img/Home Page.png" alt=""></a>
                    <a class="icon" href=""><img src="../img/Voucher.png" alt=""></a>
                    <a class="icon" href=""><img src="../img/Heart.png" alt=""></a>
                    <a class="icon" href=""><img src="../img/Messaging.png" alt=""></a>
                </div>
            </footer>
    </div>
    
</body>
</html>
